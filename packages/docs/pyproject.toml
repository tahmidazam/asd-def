[project]
name = "docs"
version = "0.5.0"
description = "The `docs` launcher: build and live-preview the asd-def Sphinx site"
requires-python = ">=3.12"
# The Sphinx toolchain is declared here as the docs package's own dependencies, pinned
# in the repo's uv.lock. The root's `docs` group pulls in this package, so installing
# the group brings the `docs` command together with the tools it drives.
dependencies = [
    "typer>=0.12",
    "sphinx>=8.1",
    "pydata-sphinx-theme>=0.16",
    "sphinx-autobuild>=2024.10",
    "myst-parser>=4.0",
    "sphinx-design>=0.6",
    "sphinx-copybutton>=0.5",
    "sphinx-polyversion>=2.0",
]

[project.scripts]
docs = "docs_cli.cli:app"

[build-system]
requires = ["uv_build>=0.11,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "docs_cli"
module-root = "src"
