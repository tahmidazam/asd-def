[project]
name = "dscat"
version = "0.5.0"
description = "Searchable catalogue over versioned tabular research datasets"
requires-python = ">=3.12"
dependencies = [
    "typer>=0.12",
    "openpyxl>=3.1",
    "sqlalchemy>=2.0",
    "tabulate>=0.9",
    "tqdm>=4.66",
    "markitdown[docx,pdf]>=0.1",
    "marker-pdf>=1.0",
]

[project.scripts]
dscat = "dscat.cli:app"

[build-system]
requires = ["uv_build>=0.11,<0.12"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "dscat"
module-root = "src"
